<!DOCTYPE html>
<html lang="si">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>පින්බර වෙසක් මංගල්‍යයක් වේවා!</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            /* ඔයාගේ පින්තූරයේ Raw ලින්ක් එක කෙලින්ම දමා ඇත */
            background: #0f0b03 url('https://raw.githubusercontent.com/supervehicle6-coder/Suba-pathum/main/1779288806168.png') no-repeat center center/cover;
            font-family: 'Segoe UI', Arial, sans-serif;
            overflow: hidden;
            position: relative;
        }

        body::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: linear-gradient(to bottom, rgba(0, 0, 0, 0.65), rgba(0, 0, 0, 0.9));
            z-index: 1;
        }

        .vesak-card {
            position: relative;
            z-index: 2;
            text-align: center;
            background: rgba(30, 22, 10, 0.7);
            backdrop-filter: blur(15px);
            -webkit-backdrop-filter: blur(15px);
            padding: 40px 25px;
            border-radius: 25px;
            border: 2px solid rgba(255, 215, 0, 0.4);
            box-shadow: 0 0 50px rgba(255, 140, 0, 0.6), inset 0 0 20px rgba(255, 215, 0, 0.15);
            max-width: 500px;
            width: 92%;
            animation: cardEntrance 1.2s ease-out forwards;
        }

        .oil-lamp {
            font-size: 3.5rem;
            margin-bottom: 15px;
            filter: drop-shadow(0 0 15px #ff9900);
            animation: flicker 2s infinite alternate;
        }

        h1 {
            color: #ffd700;
            font-size: 2.2rem;
            margin-bottom: 20px;
            text-shadow: 0 0 20px rgba(255, 215, 0, 0.8);
            line-height: 1.4;
        }

        p {
            color: #ffffff;
            font-size: 1.15rem;
            line-height: 1.9;
            margin-bottom: 25px;
            text-shadow: 1px 1px 2px rgba(0,0,0,0.5);
        }

        /* ලින්ක් එකෙන් එන නම පෙන්වන කොටස */
        .wisher-name {
            color: #00ffff;
            font-size: 1.5rem;
            font-weight: bold;
            margin-top: 10px;
            margin-bottom: 25px;
            text-shadow: 0 0 12px rgba(0, 255, 255, 0.8);
        }

        .name-input-section {
            background: rgba(255, 255, 255, 0.08);
            padding: 20px;
            border-radius: 15px;
            margin-top: 25px;
            border: 1px solid rgba(255, 215, 0, 0.25);
        }

        .name-input-section input {
            width: 100%;
            padding: 12px;
            border-radius: 25px;
            border: 1px solid #ffd700;
            background: rgba(0, 0, 0, 0.7);
            color: white;
            text-align: center;
            font-size: 1rem;
            margin-bottom: 12px;
            outline: none;
        }

        .btn {
            border: none;
            font-weight: bold;
            padding: 14px 28px;
            font-size: 1rem;
            border-radius: 50px;
            cursor: pointer;
            transition: all 0.3s ease;
            margin: 5px;
            display: inline-flex;
            align-items: center;
            gap: 8px;
            outline: none;
        }

        .music-btn {
            background: linear-gradient(135deg, #ffd700 0%, #ff6600 100%);
            color: #000000;
            box-shadow: 0 5px 20px rgba(255, 102, 0, 0.5);
        }

        .share-btn {
            background: #25d366;
            color: white;
            box-shadow: 0 5px 20px rgba(37, 211, 102, 0.4);
            width: 100%;
            justify-content: center;
        }

        .btn:hover {
            transform: scale(1.04);
            box-shadow: 0 0 25px rgba(255, 255, 255, 0.4);
        }

        @keyframes cardEntrance {
            from { opacity: 0; transform: translateY(30px); }
            to { opacity: 1; transform: translateY(0); }
        }

        @keyframes flicker {
            0%, 100% { transform: scale(1) rotate(-1deg); opacity: 0.95; }
            50% { transform: scale(1.06) rotate(1deg); opacity: 1; filter: drop-shadow(0 0 20px #ffaa00); }
        }

        .lantern-particle {
            position: absolute;
            background: radial-gradient(circle, rgba(255,215,0,0.9) 0%, rgba(255,100,0,0) 70%);
            border-radius: 50%;
            pointer-events: none;
            z-index: 1;
            animation: floatUp 9s infinite linear;
            bottom: -30px;
        }

        @keyframes floatUp {
            0% { transform: translateY(0) translateX(0) scale(0.4); opacity: 0; }
            10% { opacity: 0.8; }
            90% { opacity: 0.4; }
            100% { transform: translateY(-110vh) translateX(60px) scale(1.3); opacity: 0; }
        }
    </style>
</head>
<body>

    <audio id="vesakAudio" loop crossOrigin="anonymous">
        <source src="https://raw.githubusercontent.com/supervehicle6-coder/Suba-pathum/main/budu%20karuna-song..mp3" type="audio/mpeg">
    </audio>

    <div class="vesak-card">
        <div class="oil-lamp">🪔</div>
        <h1>පින්බර වෙසක් මංගල්‍යයක් වේවා!</h1>
        <p>
            උතුම් වූ තෙමඟුල සිහිපත් කරන මේ පින්බර වෙසක් සමයේ<br>
            ඔබ සැමට උතුම් ශ්‍රී සද්ධර්මයේ ආශිර්වාදය ලැබී,<br>
            සිත් නිවන, සමාදානය සහ සැනසීම පිරි වාසනාවන්ත කාලයක් වේවා!
        </p>

        <div class="wisher-name" id="displayName"></div>
        
        <button class="btn music-btn" onclick="toggleMusic()">
            <span id="icon">▶️</span> <span id="text">භක්ති ගීත ශ්‍රවණය කරන්න</span>
        </button>

        <div class="name-input-section">
            <input type="text" id="usernameInput" placeholder="ඔයාගේ නම මෙතන ලියන්න...">
            <button class="btn share-btn" onclick="generateShareLink()">WhatsApp මඟින් යාළුවන්ට යවන්න 🟢</button>
        </div>
    </div>

    <script>
        // ලින්ක් එකෙන් ?name= එක කියවා ගන්නා ආකාරය
        function checkNameFromUrl() {
            const urlParams = new URLSearchParams(window.location.search);
            const name = urlParams.get('name');
            const displayDiv = document.getElementById('displayName');
            if (name && name.trim() !== "") {
                displayDiv.innerText = "✨ ඔබට සුබ පතන්නේ: " + decodeURIComponent(name) + " ✨";
            } else {
                displayDiv.innerText = "";
            }
        }
        window.onload = checkNameFromUrl;

        // WhatsApp ලින්ක් එක සාදන ආකාරය
        function generateShareLink() {
            const inputName = document.getElementById('usernameInput').value.trim();
            if (inputName === "") {
                alert("කරුණාකර ලින්ක් එක හදන්න කලින් ඔයාගේ නම ඇතුළත් කරන්න!");
                return;
            }
            
            const baseUrl = "https://supervehicle6-coder.github.io/Suba-pathum/";
            const shareUrl = baseUrl + "?name=" + encodeURIComponent(inputName);
            
            const whatsappText = `🪔 *පින්බර වෙසක් මංගල්‍යයක් වේවා!* 🪔\\n\\nමෙන්න *${inputName}* ගෙන් ඔයාට ලස්සන සජීවී වෙසක් සුබපැතුම් පතක් එවලා තියෙනවා. පසුබිම් භක්ති ගීත සමඟින් රසවිඳින්න පහත ලින්ක් එක ක්ලික් කරන්න: \\n👇👇👇\\n${shareUrl}`;
            
            window.open("https://api.whatsapp.com/whatsapp://send?text=" + encodeURIComponent(whatsappText), '_blank');
        }

        // පාවෙන ආලෝක තිත්
        for (let i = 0; i < 20; i++) {
            let particle = document.createElement('div');
            particle.className = 'lantern-particle';
            let size = Math.random() * 25 + 10;
            particle.style.width = size + 'px';
            particle.style.height = size + 'px';
            particle.style.left = Math.random() * 100 + 'vw';
            particle.style.animationDelay = Math.random() * 9 + 's';
            particle.style.animationDuration = (Math.random() * 5 + 8) + 's';
            document.body.appendChild(particle);
        }

        // සින්දුව පාලනය
        const audio = document.getElementById('vesakAudio');
        const btnText = document.getElementById('text');
        const btnIcon = document.getElementById('icon');

        function toggleMusic() {
            if (audio.paused) {
                audio.play().then(() => {
                    btnText.innerText = "සංගීතය නවත්වන්න";
                    btnIcon.innerText = "⏸️";
                }).catch(error => {
                    alert("සංගීතය ක්‍රියාත්මක කිරීමට බ්‍රවුසරය ඉඩ දුන්නේ නැත. කරුණාකර නැවත බොත්තම ඔබන්න.");
                    console.log("Audio play error:", error);
                });
            } else {
                audio.pause();
                btnText.innerText = "භක්ති ගීත ශ්‍රවණය කරන්න";
                btnIcon.innerText = "▶️";
            }
        }
    </script>
</body>
</html>
